    <script>
        (function () {
            var checkoffDate = new Date("Mar 8, 2026 18:00:00").getTime();
            var countdownEl = document.getElementById("countdown");
            var lastSeconds = null;

            function pad(num, size) {
                var s = String(num);
                while (s.length < size) s = "0" + s;
                return s;
            }

            function updateCountdown() {
                var now = new Date().getTime();
                var diff = checkoffDate - now; // positive before launch, negative after
                var beforeLaunch = diff >= 0;
                var distance = Math.abs(diff);

                var totalSeconds = Math.floor(distance / 1000);
                var days = Math.floor(totalSeconds / (60 * 60 * 24));
                var hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
                var minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
                var seconds = totalSeconds % 60;

                var prefix = beforeLaunch ? "T- " : "T+ ";
                countdownEl.textContent =
                    prefix +
                    pad(days, 2) + ":" +
                    pad(hours, 2) + ":" +
                    pad(minutes, 2) + ":" +
                    pad(seconds, 2);

                // Reveal after first calculation to avoid initial 0:00:00 flash
                countdownEl.classList.add("time-visible");

                // Trigger slide animation when the seconds change
                if (lastSeconds !== null && lastSeconds !== seconds) {
                    countdownEl.classList.remove("time-tick");
                    // force reflow to restart animation
                    void countdownEl.offsetWidth;
                    countdownEl.classList.add("time-tick");
                }
                lastSeconds = seconds;
            }

            // Initial render without waiting 1 second
            updateCountdown();
            setInterval(updateCountdown, 1000);
        })();
    </script>
